<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard en vivo · Capacitación</title>
<style>
  :root {
    --bg: #f4f3ee;
    --surface: #ffffff;
    --surface-muted: #f0efe8;
    --border: #e3e1d8;
    --text-primary: #1a1a18;
    --text-secondary: #5c5b54;
    --text-muted: #8f8d84;
    --accent: #2f6fb0;
    --accent-light: #eaf2fa;
    --top-answer: #1d9e75;
    --top-answer-bg: #e6f6ef;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 2.5rem 2rem;
    background: var(--bg);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.5;
  }
  .container { max-width: 980px; margin: 0 auto; }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem 2rem;
    margin-bottom: 1.75rem;
  }
  button {
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  button:hover { background: #285f97; }
  button.icon {
    background: var(--surface-muted);
    color: var(--text-secondary);
    padding: 10px 12px;
    font-size: 16px;
  }
  button.icon:hover { background: var(--border); }

  .code-block { text-align: center; }
  .code-label { font-size: 13px; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .code-row { display: flex; align-items: center; gap: 10px; justify-content: center; }
  #codeDisplay {
    font-size: 42px;
    font-weight: 700;
    font-family: "SF Mono", Consolas, monospace;
    letter-spacing: 6px;
    color: var(--accent);
  }

  .metrics { display: flex; gap: 14px; }
  .metric {
    background: var(--surface-muted);
    border-radius: 12px;
    padding: 0.9rem 1.3rem;
    min-width: 120px;
    text-align: center;
  }
  .metric-label { font-size: 12.5px; color: var(--text-secondary); margin-bottom: 2px; }
  .metric-value { font-size: 28px; font-weight: 700; }

  #statusLine {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 1.5rem;
    padding-left: 4px;
  }

  #questionsContainer { display: flex; flex-direction: column; gap: 16px; }

  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem 1.75rem;
  }
  .q-title {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 1.1rem;
    line-height: 1.45;
  }

  .answer-block { margin-bottom: 0.9rem; }
  .answer-block:last-child { margin-bottom: 0; }
  .answer-text {
    font-size: 14.5px;
    color: var(--text-primary);
    margin-bottom: 6px;
    line-height: 1.45;
    padding: 0 2px;
  }
  .answer-bar-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .answer-bar-wrap {
    flex: 1;
    background: var(--surface-muted);
    border-radius: 6px;
    height: 22px;
    overflow: hidden;
  }
  .answer-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 6px;
    transition: width 0.3s ease;
  }
  .answer-value {
    flex: 0 0 90px;
    text-align: right;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
  }

  .answer-block.top .answer-bar-fill { background: var(--top-answer); }
  .answer-block.top .answer-value { color: var(--top-answer); }
  .answer-block.top .answer-text { font-weight: 600; }

  .empty { font-size: 14px; color: var(--text-muted); }

  @media (max-width: 720px) {
    .header { flex-direction: column; align-items: stretch; text-align: center; }
    .metrics { justify-content: center; }
    body { padding: 1.5rem 1rem; }
    .q-card { padding: 1.25rem 1.25rem; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <button id="newGroupBtn">↻ Nuevo grupo</button>
    <div class="code-block">
      <div class="code-label">Código activo</div>
      <div class="code-row">
        <div id="codeDisplay">----</div>
        <button id="copyBtn" class="icon" aria-label="Copiar código">⧉</button>
      </div>
    </div>
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Participantes</div>
        <div id="participantCount" class="metric-value">0</div>
      </div>
      <div class="metric">
        <div class="metric-label">Puntuación prom.</div>
        <div id="avgScore" class="metric-value">-</div>
      </div>
    </div>
  </div>

  <div id="statusLine">Esperando que inicies un grupo nuevo.</div>
  <div id="questionsContainer"></div>
</div>

<script>
(function(){
  const API_URL = "https://script.google.com/macros/s/AKfycbxmLR_oGi49ncaOFooe-6bfO_VCNvumO4TfO-qealaRmZRdSBNTIi1HOtMgZKaSnOZg/exec";
  const POLL_MS = 4000;
  const STORAGE_KEY = "capacitacion_active_group_code";

  const codeDisplay = document.getElementById('codeDisplay');
  const statusLine = document.getElementById('statusLine');
  const participantCount = document.getElementById('participantCount');
  const avgScore = document.getElementById('avgScore');
  const questionsContainer = document.getElementById('questionsContainer');
  const newGroupBtn = document.getElementById('newGroupBtn');
  const copyBtn = document.getElementById('copyBtn');

  let activeCode = null;
  let pollTimer = null;

  function genCode(){
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let out = '';
    for (let i = 0; i < 4; i++) out += chars[Math.floor(Math.random()*chars.length)];
    return out;
  }

  function findKey(headers, patterns){
    return headers.find(h => patterns.some(p => p.test(h)));
  }

  function loadActiveCode(){
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) { activeCode = saved; codeDisplay.textContent = activeCode; }
    } catch(e) {}
  }

  function startNewGroup(){
    const code = genCode();
    activeCode = code;
    codeDisplay.textContent = code;
    try { localStorage.setItem(STORAGE_KEY, code); } catch(e) {}
    statusLine.textContent = 'Grupo activo. Los participantes deben escribir este código en el formulario.';
    fetchAndRender();
  }

  async function fetchAndRender(){
    if (!activeCode) return;
    try {
      const resp = await fetch(API_URL, { cache: 'no-store' });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const rows = await resp.json();
      if (!Array.isArray(rows) || rows.length === 0) {
        statusLine.textContent = 'La API no devolvió filas todavía.';
        return;
      }
      const headers = Object.keys(rows[0]);

      const codeKey = findKey(headers, [/c[oó]digo.*capacitaci/i, /c[oó]digo.*grupo/i]);
      const scoreKey = findKey(headers, [/puntuaci[oó]n/i]);
      const questionKeys = headers.filter(h => /^\s*\d+\s*\./.test(h))
        .sort((a,b) => parseInt(a.match(/\d+/)[0],10) - parseInt(b.match(/\d+/)[0],10));

      if (!codeKey) {
        statusLine.textContent = 'No se encontró la columna de código.';
        return;
      }

      const filtered = rows.filter(row => {
        const val = (row[codeKey] || '').toString().trim().toUpperCase();
        return val === activeCode.toUpperCase();
      });

      participantCount.textContent = filtered.length;

      if (scoreKey) {
        const scores = filtered.map(r => parseFloat(r[scoreKey])).filter(n => !isNaN(n));
        avgScore.textContent = scores.length ? (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1) : '-';
      }

      questionsContainer.innerHTML = '';
      questionKeys.forEach(qKey => {
        const counts = {};
        filtered.forEach(r => {
          const ans = (r[qKey] || '').toString().trim();
          if (!ans) return;
          counts[ans] = (counts[ans] || 0) + 1;
        });
        const total = Object.values(counts).reduce((a,b)=>a+b,0);
        const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);

        const card = document.createElement('div');
        card.className = 'q-card';

        const qTitle = document.createElement('div');
        qTitle.className = 'q-title';
        qTitle.textContent = qKey.trim();
        card.appendChild(qTitle);

        if (sorted.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'empty';
          empty.textContent = 'Sin respuestas todavía.';
          card.appendChild(empty);
        } else {
          sorted.forEach(([label, count], idx) => {
            const pct = total ? Math.round((count/total)*100) : 0;

            const block = document.createElement('div');
            block.className = 'answer-block' + (idx === 0 ? ' top' : '');

            const text = document.createElement('div');
            text.className = 'answer-text';
            text.textContent = label;

            const barRow = document.createElement('div');
            barRow.className = 'answer-bar-row';

            const barWrap = document.createElement('div');
            barWrap.className = 'answer-bar-wrap';
            const bar = document.createElement('div');
            bar.className = 'answer-bar-fill';
            bar.style.width = pct + '%';
            barWrap.appendChild(bar);

            const val = document.createElement('div');
            val.className = 'answer-value';
            val.textContent = count + ' · ' + pct + '%';

            barRow.appendChild(barWrap);
            barRow.appendChild(val);

            block.appendChild(text);
            block.appendChild(barRow);
            card.appendChild(block);
          });
        }
        questionsContainer.appendChild(card);
      });

      const now = new Date();
      statusLine.textContent = 'Actualizado ' + now.toLocaleTimeString() + ' · actualiza cada 4s';
    } catch (err) {
      statusLine.textContent = 'Error al leer la API: ' + err.message;
    }
  }

  newGroupBtn.addEventListener('click', () => {
    if (pollTimer) clearInterval(pollTimer);
    startNewGroup();
    pollTimer = setInterval(fetchAndRender, POLL_MS);
  });

  copyBtn.addEventListener('click', async () => {
    if (!activeCode) return;
    try {
      await navigator.clipboard.writeText(activeCode);
      const orig = copyBtn.textContent;
      copyBtn.textContent = '✓';
      setTimeout(() => { copyBtn.textContent = orig; }, 1200);
    } catch(e) {}
  });

  loadActiveCode();
  if (activeCode) {
    statusLine.textContent = 'Grupo activo. Los participantes deben escribir este código en el formulario.';
    fetchAndRender();
    pollTimer = setInterval(fetchAndRender, POLL_MS);
  }
})();
</script>
</body>
</html>
