<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard en vivo · Capacitación</title>
<style>
  :root {
    --bg: #f4f3ee;
    --surface: #ffffff;
    --surface-muted: #f0efe8;
    --border: #e3e1d8;
    --text-primary: #1a1a18;
    --text-secondary: #5c5b54;
    --text-muted: #8f8d84;
    --accent: #2f6fb0;
    --correct: #1d9e75;
    --correct-bg: #e6f6ef;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 2.5rem 2rem;
    background: var(--bg);
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.5;
  }
  .container { max-width: 980px; margin: 0 auto; }
  button {
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  button:hover { background: #285f97; }
  button.secondary { background: var(--surface-muted); color: var(--text-secondary); }
  button.secondary:hover { background: var(--border); }
  button.icon { background: var(--surface-muted); color: var(--text-secondary); padding: 10px 12px; font-size: 16px; }
  button.icon:hover { background: var(--border); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ---------- Pantalla 1: código ---------- */
  #codeScreen {
    min-height: 70vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 2rem;
  }
  #codeScreen .eyebrow { font-size: 15px; color: var(--text-secondary); }
  #bigCode {
    font-size: 96px;
    font-weight: 800;
    font-family: "SF Mono", Consolas, monospace;
    letter-spacing: 12px;
    color: var(--accent);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem 3rem;
  }
  #codeScreen .hint { font-size: 14px; color: var(--text-muted); max-width: 420px; }
  #codeScreen .actions { display: flex; gap: 12px; }

  /* ---------- Pantalla 2: resultados ---------- */
  #resultsScreen { display: none; }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem 2rem;
    margin-bottom: 1.75rem;
  }
  .code-block { text-align: center; }
  .code-label { font-size: 13px; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .code-row { display: flex; align-items: center; gap: 10px; justify-content: center; }
  #codeDisplaySmall {
    font-size: 32px;
    font-weight: 700;
    font-family: "SF Mono", Consolas, monospace;
    letter-spacing: 4px;
    color: var(--accent);
  }
  .metrics { display: flex; gap: 14px; }
  .metric {
    background: var(--surface-muted);
    border-radius: 12px;
    padding: 0.9rem 1.3rem;
    min-width: 120px;
    text-align: center;
  }
  .metric-label { font-size: 12.5px; color: var(--text-secondary); margin-bottom: 2px; }
  .metric-value { font-size: 28px; font-weight: 700; }

  #statusLine { font-size: 13px; color: var(--text-muted); margin-bottom: 1.5rem; padding-left: 4px; }
  #questionsContainer { display: flex; flex-direction: column; gap: 16px; }

  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem 1.75rem;
  }
  .q-title { font-size: 17px; font-weight: 600; margin-bottom: 1.1rem; line-height: 1.45; }

  .answer-block { margin-bottom: 0.9rem; }
  .answer-block:last-child { margin-bottom: 0; }
  .answer-text {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14.5px;
    color: var(--text-primary);
    margin-bottom: 6px;
    line-height: 1.45;
    padding: 0 2px;
  }
  .correct-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11.5px;
    font-weight: 700;
    color: var(--correct);
    background: var(--correct-bg);
    border-radius: 6px;
    padding: 2px 8px;
    flex-shrink: 0;
  }
  .answer-bar-row { display: flex; align-items: center; gap: 12px; }
  .answer-bar-wrap { flex: 1; background: var(--surface-muted); border-radius: 6px; height: 22px; overflow: hidden; }
  .answer-bar-fill { height: 100%; background: var(--accent); border-radius: 6px; transition: width 0.3s ease; }
  .answer-value { flex: 0 0 90px; text-align: right; font-size: 13px; font-weight: 600; color: var(--text-secondary); }

  .answer-block.correct .answer-bar-fill { background: var(--correct); }
  .answer-block.correct .answer-value { color: var(--correct); }
  .answer-block.correct .answer-text { font-weight: 600; }

  .empty { font-size: 14px; color: var(--text-muted); }

  @media (max-width: 720px) {
    #bigCode { font-size: 56px; letter-spacing: 8px; padding: 1.25rem 1.5rem; }
    .header { flex-direction: column; align-items: stretch; text-align: center; }
    .metrics { justify-content: center; }
    body { padding: 1.5rem 1rem; }
    .q-card { padding: 1.25rem 1.25rem; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Pantalla 1: código -->
  <div id="codeScreen">
    <div class="eyebrow">Código de este grupo</div>
    <div id="bigCode">----</div>
    <div class="hint">Los participantes deben escribir este código en la pregunta "Código de la capacitación" del formulario.</div>
    <div class="actions">
      <button id="newGroupBtn">↻ Nuevo grupo</button>
      <button id="goResultsBtn" class="secondary" disabled>Ver respuestas →</button>
    </div>
  </div>

  <!-- Pantalla 2: resultados -->
  <div id="resultsScreen">
    <div class="header">
      <button id="backToCodeBtn" class="secondary">← Ver código</button>
      <div class="code-block">
        <div class="code-label">Código activo</div>
        <div class="code-row">
          <div id="codeDisplaySmall">----</div>
          <button id="copyBtn" class="icon" aria-label="Copiar código">⧉</button>
        </div>
      </div>
      <div class="metrics">
        <div class="metric">
          <div class="metric-label">Participantes</div>
          <div id="participantCount" class="metric-value">0</div>
        </div>
        <div class="metric">
          <div class="metric-label">Puntuación prom.</div>
          <div id="avgScore" class="metric-value">-</div>
        </div>
      </div>
    </div>
    <div id="statusLine">Cargando resultados...</div>
    <div id="questionsContainer"></div>
  </div>

</div>

<script>
(function(){
  const RESPONSES_URL = "https://script.google.com/macros/s/AKfycbxmLR_oGi49ncaOFooe-6bfO_VCNvumO4TfO-qealaRmZRdSBNTIi1HOtMgZKaSnOZg/exec";
  const STRUCTURE_URL = "https://script.google.com/macros/s/AKfycbw_-1yS-R1XhtJarHk0MCKprfKNq-wLduPa04-BWp_cpXvB3BPIG0L5lMtHHGSWXIFwjQ/exec";
  const POLL_MS = 4000;
  const STORAGE_KEY = "capacitacion_active_group_code";

  const codeScreen = document.getElementById('codeScreen');
  const resultsScreen = document.getElementById('resultsScreen');
  const bigCode = document.getElementById('bigCode');
  const codeDisplaySmall = document.getElementById('codeDisplaySmall');
  const statusLine = document.getElementById('statusLine');
  const participantCount = document.getElementById('participantCount');
  const avgScore = document.getElementById('avgScore');
  const questionsContainer = document.getElementById('questionsContainer');
  const newGroupBtn = document.getElementById('newGroupBtn');
  const goResultsBtn = document.getElementById('goResultsBtn');
  const backToCodeBtn = document.getElementById('backToCodeBtn');
  const copyBtn = document.getElementById('copyBtn');

  let activeCode = null;
  let pollTimer = null;
  let structureCache = null;

  function genCode(){
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let out = '';
    for (let i = 0; i < 4; i++) out += chars[Math.floor(Math.random()*chars.length)];
    return out;
  }

  function findKey(headers, patterns){
    return headers.find(h => patterns.some(p => p.test(h)));
  }

  function extractNum(str){
    const m = (str || '').match(/^\s*(\d+)\s*\./);
    return m ? parseInt(m[1], 10) : null;
  }

  function showCodeScreen(){
    codeScreen.style.display = 'flex';
    resultsScreen.style.display = 'none';
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  }

  function showResultsScreen(){
    codeScreen.style.display = 'none';
    resultsScreen.style.display = 'block';
    fetchAndRender();
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(fetchAndRender, POLL_MS);
  }

  function setCode(code){
    activeCode = code;
    bigCode.textContent = code;
    codeDisplaySmall.textContent = code;
    goResultsBtn.disabled = !code;
  }

  function loadActiveCode(){
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) setCode(saved);
    } catch(e) {}
  }

  function startNewGroup(){
    const code = genCode();
    setCode(code);
    try { localStorage.setItem(STORAGE_KEY, code); } catch(e) {}
    showCodeScreen();
  }

  async function getStructure(){
    if (structureCache) return structureCache;
    const resp = await fetch(STRUCTURE_URL, { cache: 'no-store' });
    if (!resp.ok) throw new Error('HTTP ' + resp.status + ' (estructura)');
    const data = await resp.json();
    structureCache = data.filter(q => extractNum(q.title) !== null);
    return structureCache;
  }

  async function fetchAndRender(){
    if (!activeCode) return;
    try {
      const [structure, respPayload] = await Promise.all([
        getStructure(),
        fetch(RESPONSES_URL, { cache: 'no-store' }).then(r => {
          if (!r.ok) throw new Error('HTTP ' + r.status + ' (respuestas)');
          return r.json();
        })
      ]);

      if (!Array.isArray(respPayload) || respPayload.length === 0) {
        statusLine.textContent = 'La API de respuestas no devolvió filas todavía.';
        return;
      }
      const headers = Object.keys(respPayload[0]);
      const codeKey = findKey(headers, [/c[oó]digo.*capacitaci/i, /c[oó]digo.*grupo/i]);
      const scoreKey = findKey(headers, [/puntuaci[oó]n/i]);

      if (!codeKey) {
        statusLine.textContent = 'No se encontró la columna de código.';
        return;
      }

      const filtered = respPayload.filter(row => {
        const val = (row[codeKey] || '').toString().trim().toUpperCase();
        return val === activeCode.toUpperCase();
      });

      participantCount.textContent = filtered.length;

      if (scoreKey) {
        const scores = filtered.map(r => parseFloat(r[scoreKey])).filter(n => !isNaN(n));
        avgScore.textContent = scores.length ? (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1) : '-';
      }

      const headerByNum = {};
      headers.forEach(h => {
        const n = extractNum(h);
        if (n !== null) headerByNum[n] = h;
      });

      questionsContainer.innerHTML = '';
      structure.forEach(q => {
        const qNum = extractNum(q.title);
        const respKey = headerByNum[qNum];

        const counts = {};
        if (respKey) {
          filtered.forEach(r => {
            const ans = (r[respKey] || '').toString().trim();
            if (!ans) return;
            counts[ans] = (counts[ans] || 0) + 1;
          });
        }
        const totalAnswered = Object.values(counts).reduce((a,b)=>a+b,0);

        const card = document.createElement('div');
        card.className = 'q-card';

        const qTitle = document.createElement('div');
        qTitle.className = 'q-title';
        qTitle.textContent = q.title.trim();
        card.appendChild(qTitle);

        if (!q.choices || q.choices.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'empty';
          empty.textContent = 'Sin opciones definidas.';
          card.appendChild(empty);
        } else {
          q.choices.forEach(choice => {
            const count = counts[choice.text.trim()] || 0;
            const pct = totalAnswered ? Math.round((count/totalAnswered)*100) : 0;

            const block = document.createElement('div');
            block.className = 'answer-block' + (choice.correct ? ' correct' : '');

            const text = document.createElement('div');
            text.className = 'answer-text';
            const span = document.createElement('span');
            span.textContent = choice.text;
            text.appendChild(span);
            if (choice.correct) {
              const badge = document.createElement('span');
              badge.className = 'correct-badge';
              badge.textContent = '✓ Correcta';
              text.appendChild(badge);
            }

            const barRow = document.createElement('div');
            barRow.className = 'answer-bar-row';

            const barWrap = document.createElement('div');
            barWrap.className = 'answer-bar-wrap';
            const bar = document.createElement('div');
            bar.className = 'answer-bar-fill';
            bar.style.width = pct + '%';
            barWrap.appendChild(bar);

            const val = document.createElement('div');
            val.className = 'answer-value';
            val.textContent = count + ' · ' + pct + '%';

            barRow.appendChild(barWrap);
            barRow.appendChild(val);

            block.appendChild(text);
            block.appendChild(barRow);
            card.appendChild(block);
          });
        }
        questionsContainer.appendChild(card);
      });

      const now = new Date();
      statusLine.textContent = 'Actualizado ' + now.toLocaleTimeString() + ' · actualiza cada 4s';
    } catch (err) {
      statusLine.textContent = 'Error: ' + err.message;
    }
  }

  newGroupBtn.addEventListener('click', startNewGroup);
  goResultsBtn.addEventListener('click', showResultsScreen);
  backToCodeBtn.addEventListener('click', showCodeScreen);

  copyBtn.addEventListener('click', async () => {
    if (!activeCode) return;
    try {
      await navigator.clipboard.writeText(activeCode);
      const orig = copyBtn.textContent;
      copyBtn.textContent = '✓';
      setTimeout(() => { copyBtn.textContent = orig; }, 1200);
    } catch(e) {}
  });

  loadActiveCode();
  showCodeScreen();
})();
</script>
</body>
</html>
